<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Carbono</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>🌍 Calculadora de Emissões de Carbono</h1>
  </header>

  <main>
    <!-- Seleção de cidades -->
    <section class="city-selection">
      <label for="cityFrom">Cidade de origem:</label>
      <select id="cityFrom"></select>

      <label for="cityTo">Cidade de destino:</label>
      <select id="cityTo"></select>
    </section>

    <!-- Seleção de veículos com ícones -->
    <section class="transport-selection">
      <h2>Selecione o meio de transporte:</h2>
      <div class="transport-options">
        <label>
          <input type="radio" name="transport" value="car" checked>
          🚗 Carro
        </label>
        <label>
          <input type="radio" name="transport" value="bus">
          🚌 Ônibus
        </label>
        <label>
          <input type="radio" name="transport" value="train">
          🚆 Trem
        </label>
        <label>
          <input type="radio" name="transport" value="plane">
          ✈️ Avião
        </label>
      </div>
    </section>

    <section>
      <button id="calculateBtn">Calcular Emissões</button>
    </section>

    <section id="result"></section>
  </main>

  <footer>
    <p>Projeto de descarbonização - Calculadora de Carbono</p>
  </footer>

  <script src="js/routes-data.js"></script>
  <script src="js/config.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
