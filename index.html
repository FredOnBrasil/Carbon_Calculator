<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Carbono</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Calculadora de Emissões de Carbono</h1>
  </header>

  <main>
    <section>
      <label for="route">Selecione a rota:</label>
      <select id="route"></select>
    </section>

    <section>
      <label for="transport">Modo de transporte:</label>
      <select id="transport">
        <option value="car">Carro</option>
        <option value="bus">Ônibus</option>
        <option value="train">Trem</option>
        <option value="plane">Avião</option>
      </select>
    </section>

    <section>
      <button id="calculateBtn">Calcular Emissões</button>
    </section>

    <section id="result"></section>
  </main>

  <footer>
    <p>Projeto de descarbonização - Calculadora de Carbono</p>
  </footer>

  <script src="js/routes-data.js"></script>
  <script src="js/config.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
